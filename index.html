<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Operon Manager</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1e1e1e; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .box { background: #252526; border: 1px solid #3a3a3a; border-radius: 12px; padding: 40px 36px; width: 380px; text-align: center; }
    .logo { font-size: 20px; font-weight: 600; color: #4fc3f7; margin-bottom: 8px; }
    .subtitle { font-size: 13px; color: #6a6a6a; margin-bottom: 28px; }
    .message { font-size: 15px; color: #e0e0e0; margin-bottom: 8px; }
    .sub { font-size: 13px; color: #6a6a6a; }
    input { width: 100%; background: #1e1e1e; border: 1px solid #3a3a3a; border-radius: 6px; color: #e0e0e0; font-size: 14px; padding: 10px 12px; margin-bottom: 12px; outline: none; }
    input:focus { border-color: #4fc3f7; }
    button { width: 100%; background: #4fc3f7; color: #1e1e1e; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; padding: 11px; cursor: pointer; margin-top: 4px; }
    button:hover { background: #38b2e8; }
    button:disabled { background: #3a3a3a; color: #6a6a6a; cursor: not-allowed; }
    .err { color: #ef5350; font-size: 13px; margin-top: 10px; }
    .success { color: #66bb6a; font-size: 15px; margin-bottom: 8px; }
    #reset-form, #confirmed, #error-state { display: none; }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">Operon Manager</div>
    <div class="subtitle">Account Portal</div>

    <div id="confirmed">
      <div class="success">Email confirmed</div>
      <div class="sub">Your email has been verified. You can now log in to the app.</div>
    </div>

    <div id="reset-form">
      <div class="message">Set a new password</div>
      <div class="sub" style="margin-bottom:20px;">Enter a new password for your account.</div>
      <input type="password" id="new-pass" placeholder="New password" />
      <input type="password" id="confirm-pass" placeholder="Confirm new password" />
      <button id="reset-btn" onclick="doReset()">Update Password</button>
      <div class="err" id="reset-err"></div>
    </div>

    <div id="error-state">
      <div class="message">Something went wrong</div>
      <div class="sub" id="error-msg">This link may have expired. Contact your administrator.</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const _OU = 'https://boldfdrptkwotskeqvtl.supabase.co';
    const _OK = 'sb_publishable_w4lU9k6ye2kQbgpGSnV7Kw_OQy2qh1V';
    const sb = supabase.createClient(_OU, _OK);

    async function init() {
      const hash = window.location.hash.substring(1);
      const params = new URLSearchParams(hash);
      const type = params.get('type');
      const accessToken = params.get('access_token');
      const refreshToken = params.get('refresh_token');
      const errorDesc = params.get('error_description');

      if (errorDesc) {
        document.getElementById('error-state').style.display = 'block';
        document.getElementById('error-msg').textContent = errorDesc;
        return;
      }

      if (type === 'signup' || type === 'email_confirmation') {
        document.getElementById('confirmed').style.display = 'block';
        return;
      }

      if ((type === 'recovery' || type === 'invite') && accessToken) {
        await sb.auth.setSession({ access_token: accessToken, refresh_token: refreshToken });
        document.getElementById('reset-form').querySelector('.message').textContent = type === 'invite' ? 'Set your password' : 'Set a new password';
        document.getElementById('reset-form').style.display = 'block';
        return;
      }

      document.getElementById('error-state').style.display = 'block';
    }

    async function doReset() {
      const pass = document.getElementById('new-pass').value;
      const confirm = document.getElementById('confirm-pass').value;
      const errEl = document.getElementById('reset-err');
      const btn = document.getElementById('reset-btn');

      if (pass.length < 8) { errEl.textContent = 'Password must be at least 8 characters.'; return; }
      if (pass !== confirm) { errEl.textContent = 'Passwords do not match.'; return; }

      btn.disabled = true;
      btn.textContent = 'Updating...';

      const { error } = await sb.auth.updateUser({ password: pass });
      if (error) {
        errEl.textContent = error.message;
        btn.disabled = false;
        btn.textContent = 'Update Password';
      } else {
        document.getElementById('reset-form').style.display = 'none';
        document.getElementById('confirmed').style.display = 'block';
        document.querySelector('.success').textContent = 'Password updated';
        document.querySelector('.sub').textContent = 'Your password has been changed. You can now log in to the app.';
      }
    }

    init();
  </script>
</body>
</html>
